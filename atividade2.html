<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países para Conhecer</title>
    <style>
        /* Estilização para chegar no resultado da imagem */
        body {
            font-family: serif; /* Fonte similar à da imagem */
            margin: 40px;
        }

        h2 {
            margin-bottom: 5px;
        }

        hr {
            border: 0;
            border-top: 1px solid #ccc;
            width: 300px; /* Ajuste para o tamanho da linha */
            margin-left: 0;
            margin-bottom: 20px;
        }

        ol {
            color: purple; /* Cor solicitada no exercício */
            font-size: 1.2rem;
            font-weight: bold;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h2>Países para conhecer</h2>
    <hr>

    <ol>
        <li>Itália</li>
        <li>Espanha</li>
        <li>Equador</li>
        <li>Chile</li>
    </ol>

</body>
</html>
