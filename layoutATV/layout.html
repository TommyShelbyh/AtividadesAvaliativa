<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout </title>
    <style>
        /* reset do CSS inserido pelo navegador */
        * {
            margin: 0;
            padding: 0;
        }
        h1 { margin: 0 }
        .pagina {
            border: 2px solid rgb(224, 100, 100);
            width: 960px; /* defina a largura */
            margin: auto; /* centraliza a pagina */
        }
        .topo {
            background-color: rgb(215, 0, 100);
            padding-left: 20px;  
            padding-right: 20px;
        }
        .menu {
            background-color: rgb(108, 25, 25);
            border: 2px solid rebeccapurple;
            height: 30px; /* remover depois */
        }
        .conteudo {
            height: 300px;
            background-color: rgb(255, 255, 255);
        }
        .rodape {
            background-color: rgb(215, 0, 100);
            border-top: 2px sollid rebeccapurple;
            height: 50px; /* remover depois */
        }
        ul, ol {
            padding: 10px;
            margin-left: 40px;
        }
        .linha {
            /*permite colocar os items da div na horizontal */
            display: flex;
        }
    </style>
</head>
<body>
    

    <div class="pagina">
        <div class="topo">
            <h1>Topo</h1>
            <div class="menu"></div>
        </div>
        <div class="conteudo">
            <div class="linha">
            <ul>
                <li>item1</li>
                <li>item2</li>
            </ul>
        </div>
        </div>
        <div class="rodape"></div>
    </div>
</body>
</html>
